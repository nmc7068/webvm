name: Deploy

on:
  workflow_dispatch:
    inputs:
      DOCKERFILE_PATH:
        type: string
        description: 'Path to the Dockerfile'
        required: true
        default: 'dockerfiles/debian_mini'
      IMAGE_SIZE:
        type: string
        description: 'Image size, 950M max'
        required: true
        default: '750M'
      DEPLOY_TO_NETLIFY:
        type: boolean
        description: 'Deploy to Netlify'
        required: true
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG: "ext2-webvm-base-image"
      IMAGE_SIZE: '${{ github.event.inputs.IMAGE_SIZE }}'
      DEPLOY_DIR: /home/runner/work/webvm_deploy
    
    steps:
      - uses: actions/checkout@v4

      - name: Generate the image_name
        run: echo "IMAGE_NAME=$(basename ${{ github.event.inputs.DOCKERFILE_PATH }})_$(date +%Y%m%d)_${{ github.run_id }}.ext2" >> $GITHUB_ENV

      - run: mkdir -p ${{ env.DEPLOY_DIR }}

      - name: Build Docker Image
        run: docker build . --tag $TAG --file ${{ github.event.inputs.DOCKERFILE_PATH }} --platform=i386
      
      - name: Run and Inspect Container
        run: |
          docker run --dns 8.8.8.8 --dns 8.8.4.4 -d --name temp_container $TAG
          echo "CONTAINER_ID=$(docker ps -aqf "name=temp_container")" >> $GITHUB_ENV
          # Extract metadata
          echo "ENV=$(docker inspect temp_container | jq --compact-output '.[0].Config.Env')" >> $GITHUB_ENV
          echo "CWD=$(docker inspect temp_container | jq --compact-output '.[0].Config.WorkingDir')" >> $GITHUB_ENV
          echo "CMD=$(docker inspect temp_container | jq --compact-output '.[0].Config.Cmd')" >> $GITHUB_ENV

      - name: Create ext2 image
        run: |
          sudo fallocate -l $IMAGE_SIZE ${{ env.IMAGE_NAME }}
          sudo mkfs.ext2 -r 0 ${{ env.IMAGE_NAME }}
          sudo mkdir -p /mnt/webvm
          sudo mount -o loop -t ext2 ${{ env.IMAGE_NAME }} /mnt/webvm
          sudo docker cp temp_container:/ /mnt/webvm/
          sudo umount /mnt/webvm

      - name: Split image for HTTPFS
        run: |
          split ${{ env.IMAGE_NAME }} ${{ env.DEPLOY_DIR }}/${{ env.IMAGE_NAME }}.c -a 6 -b 128k -x --additional-suffix=.txt
          stat -c%s ${{ env.IMAGE_NAME }} > ${{ env.DEPLOY_DIR }}/${{ env.IMAGE_NAME }}.meta

      - name: Build WebVM Frontend
        run: |
          sed -i 's#IMAGE_URL#"${{ env.IMAGE_NAME }}"#g' config_github_terminal.js
          npm install
          WEBVM_MODE=github npm run build
          mv build/* ${{ env.DEPLOY_DIR }}/

      - name: Localize VM Engine
        run: |
          # Download the engine scripts so they are hosted on YOUR site
          curl -L https://cdn.leaningtech.com/cheerpx.js -o ${{ env.DEPLOY_DIR }}/cheerpx.js
          
          # Force index.html to look at the local script instead of the CDN
          sed -i 's|https://cdn.leaningtech.com/cheerpx.js|cheerpx.js|g' ${{ env.DEPLOY_DIR }}/index.html

      - name: Apply CKM Bypass (Headers & Service Worker)
        run: |
          # 1. Create Netlify Headers file
          echo -e "/*\n  Cross-Origin-Opener-Policy: same-origin\n  Cross-Origin-Embedder-Policy: require-corp" > ${{ env.DEPLOY_DIR }}/_headers
          
          # 2. Inject COI Service Worker (Force isolation in iframes)
          curl -L https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js -o ${{ env.DEPLOY_DIR }}/coi-serviceworker.js
          
          # 3. Add script tag to the TOP of index.html
          sed -i '1i<script src="coi-serviceworker.js"></script>' ${{ env.DEPLOY_DIR }}/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ${{ env.DEPLOY_DIR }}
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
